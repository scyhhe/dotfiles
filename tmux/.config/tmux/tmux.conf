# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core settings ──────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on        # fill gaps when a window is closed
set -g mouse on
set -g history-limit 10000
set -sg escape-time 10            # faster escape (important for nvim)
set -g focus-events on            # lets nvim autoread work correctly

# ── Splits ─────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style, no plugin needed) ─────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Session switching ──────────────────────────────────────────────────────────
bind s choose-tree -Zs           # override default: shows sessions+windows tree
bind C-a switch-client -l    # jump to last session (double-tap prefix)

# ── Reload config ──────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ── Copy mode (vi keys) ────────────────────────────────────────────────────────
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Plugins ────────────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# ── Catppuccin (Frappé) ────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'frappe'

# Window styling
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Status bar modules (left → right)
set -g @catppuccin_status_left_separator '█'
set -g @catppuccin_status_modules_right 'session date_time'
set -g @catppuccin_date_time_text '%H:%M'

# resurrect: also restore nvim sessions if Session.vim present
set -g @resurrect-strategy-nvim 'session'

# continuum: auto-save every 15 min, restore on tmux server start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Tmux File Picker
bind C-f display-popup -E "tmux-file-picker"

# Use -g flag to show paths relative to git root
bind C-g display-popup -E "tmux-file-picker -g"

# Use --directories to select directories instead of files
bind C-d display-popup -E "tmux-file-picker --directories"

# Use --zoxide to select from your frecent directories first
bind C-z display-popup -E "tmux-file-picker --zoxide"

# Use --zoxide with --dir-only to just insert the directory path
bind C-v display-popup -E "tmux-file-picker --zoxide --dir-only"

# Combine --zoxide with --git-root
bind C-x display-popup -E "tmux-file-picker --zoxide --git-root"

# ── workmux ────────────────────────────────────────────────────────────────────
bind D display-popup -h 30 -w 150 -E "workmux dashboard"
bind L run-shell "workmux last-done"
bind Tab run-shell "workmux last-agent"
bind S run-shell "workmux sidebar --session"

# Claude History 
bind C-c display-popup -E "claude-history" 

# ── tpm bootstrap (keep last) ──────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
